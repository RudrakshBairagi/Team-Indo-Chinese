<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        'city-neon': '#29FFB3',
                        'city-purple': '#A855F7',
                        'city-black': '#121212',
                        'city-gray': '#F5F5F7',
                        "primary": "#A855F7",
                        "background-light": "rgb(255 251 227)",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" },
                    boxShadow: {
                        'soft': '0 8px 24px rgba(0, 0, 0, 0.12)',
                        'subtle': '0 8px 24px rgba(0, 0, 0, 0.12)',
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .line-art-overlay {
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 200C50 117.157 117.157 50 200 50C282.843 50 350 117.157 350 200C350 282.843 282.843 350 200 350C117.157 350 50 200Z' stroke='%2329FFB3' stroke-opacity='0.2' stroke-width='2'/%3E%3Cpath d='M100 200C100 144.772 144.772 100 200 100C255.228 100 300 144.772 300 200C300 255.228 255.228 300 200 300C144.772 300 100 200Z' stroke='%23A855F7' stroke-opacity='0.2' stroke-width='2'/%3E%3Ccircle cx='200' cy='200' r='10' fill='%23A855F7' fill-opacity='0.4'/%3E%3Cpath d='M200 50V0M200 400V350M50 200H0M400 200H350' stroke='white' stroke-opacity='0.1'/%3E%3C/svg%3E");
            background-size: cover;
        }

        body {
            background-color: rgb(255 251 227);
        }
    </style>
</head>

<body class="bg-background-light font-sans text-city-black min-h-screen">
    <div class="flex flex-col h-screen max-w-md mx-auto bg-background-light shadow-2xl overflow-hidden relative">
        <!-- Header -->
        <header class="pt-12 px-6 flex justify-between items-center bg-transparent sticky top-0 z-20">
            <div class="flex flex-col cursor-pointer">
                <div class="flex items-center gap-1">
                    <span class="font-semibold text-lg" style="">San Francisco, CA</span>
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                        <path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </div>
                <div class="text-[10px] font-medium uppercase tracking-wider text-city-purple" style="">hello, hustler!
                </div>
            </div>
            <div class="flex gap-4">
                <button aria-label="Saved" class="p-1" style="">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                        <path
                            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </button>
                <button aria-label="Profile" class="p-1" style="">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </button>
            </div>
        </header>
        <!-- Search Bar -->
        <section class="mt-6 px-6">
            <div class="relative shadow-subtle rounded-2xl">
                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round"
                            stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </span>
                <input
                    class="w-full bg-white/50 backdrop-blur-sm border-none rounded-2xl py-4 pl-12 pr-4 text-sm focus:ring-2 focus:ring-city-purple transition-all placeholder-gray-600"
                    placeholder="Search for events, organizations..." type="text" />
            </div>
        </section>
        <!-- Filter Chips -->
        <div class="flex gap-2 px-6 py-4 overflow-x-auto hide-scrollbar">
            <button
                class="flex shrink-0 items-center justify-center rounded-full bg-city-purple text-white px-4 py-1.5 text-sm font-bold"
                style="">
                Today
            </button>
            <button
                class="flex shrink-0 items-center justify-center rounded-full bg-white/40 border border-black/5 px-4 py-1.5 text-sm font-medium"
                style="">
                This Weekend
            </button>
            <button
                class="flex shrink-0 items-center justify-center gap-x-1 rounded-full bg-white/40 border border-black/5 px-4 py-1.5 text-sm font-medium"
                style="">
                Music
                <span class="material-symbols-outlined text-xs" style="">keyboard_arrow_down</span>
            </button>
            <button
                class="flex shrink-0 items-center justify-center rounded-full bg-white/40 border border-black/5 px-4 py-1.5 text-sm font-medium"
                style="">
                Art
            </button>
        </div>
        <!-- Scrollable Event List -->
        <main class="flex-1 overflow-y-auto px-6 pb-32">
            <div class="space-y-8">
                <!-- Event Card 1 -->
                <div
                    class="bg-city-black rounded-[2.5rem] flex flex-col overflow-hidden shadow-soft border border-white/5">
                    <div class="h-56 relative bg-white overflow-hidden">
                        <div
                            class="absolute top-4 right-4 w-8 h-8 bg-city-black flex items-center justify-center rotate-12 border-2 border-white/20">
                            <svg class="w-4 h-4 text-city-neon" fill="currentColor" viewbox="0 0 24 24">
                                <path
                                    d="M12 0l3.09 8.26h8.91l-7.21 5.24 2.76 8.5-7.55-5.48-7.55 5.48 2.76-8.5-7.21-5.24h8.91z">
                                </path>
                            </svg>
                        </div>
                        <div class="absolute bottom-4 left-6">
                            <span
                                class="bg-city-black text-city-neon text-[10px] font-black px-2 py-1 rounded-sm uppercase italic border border-city-neon/30"
                                style="">Digital Art</span>
                        </div>
                    </div>
                    <div class="p-6 bg-city-black flex justify-between items-center">
                        <div class="flex-1">
                            <h3 class="text-white font-bold text-lg leading-tight" style="">Neon Pulse: Digital Arts
                            </h3>
                            <p class="text-gray-400 text-xs mt-1 mb-4" style="">Saturday, Oct 24 • 10 AM</p>
                            <div class="text-gray-400 text-xs" style="">Location: FallCity, Phoenix</div>
                            <button
                                class="bg-city-neon text-city-black text-xs font-bold px-4 py-2 rounded-xl hover:opacity-90 transition-opacity uppercase tracking-wider mt-4"
                                style="">Register Now</button>
                        </div>
                        <div
                            class="bg-white/10 rounded-2xl p-4 flex items-center justify-center min-w-[56px] min-h-[56px] border border-white/5 ml-4">
                            <svg class="h-6 w-6 text-city-neon fill-current" viewbox="0 0 24 24">
                                <path
                                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z">
                                </path>
                            </svg>
                        </div>
                    </div>
                </div>
                <!-- Event Card 2 -->
                <div
                    class="bg-city-black rounded-[2.5rem] flex flex-col overflow-hidden shadow-soft border border-white/5">
                    <div class="h-56 relative bg-white overflow-hidden">
                        <div
                            class="absolute top-4 right-4 w-8 h-8 bg-city-black flex items-center justify-center rotate-12 border-2 border-white/20">
                            <svg class="w-4 h-4 text-city-neon" fill="currentColor" viewbox="0 0 24 24">
                                <path
                                    d="M12 0l3.09 8.26h8.91l-7.21 5.24 2.76 8.5-7.55-5.48-7.55 5.48 2.76-8.5-7.21-5.24h8.91z">
                                </path>
                            </svg>
                        </div>
                        <div class="absolute bottom-4 left-6">
                            <span
                                class="bg-city-black text-city-neon text-[10px] font-black px-2 py-1 rounded-sm uppercase italic border border-city-neon/30"
                                style="">Summer Rave</span>
                        </div>
                    </div>
                    <div class="p-6 bg-city-black flex justify-between items-center">
                        <div class="flex-1">
                            <h3 class="text-white font-bold text-lg leading-tight" style="">Echoes Underground</h3>
                            <p class="text-gray-400 text-xs mt-1 mb-4" style="">Saturday, Oct 26 • 8 PM</p>
                            <button
                                class="bg-city-neon text-city-black text-xs font-bold px-4 py-2 rounded-xl hover:opacity-90 transition-opacity uppercase tracking-wider"
                                style="">Register Now</button>
                        </div>
                        <div
                            class="bg-white/10 rounded-2xl p-4 flex items-center justify-center min-w-[56px] min-h-[56px] border border-white/5 ml-4">
                            <svg class="h-6 w-6 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                                <path
                                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
                                    stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                <!-- Event Card 3 -->
                <div class="bg-white border border-gray-100 rounded-[2.5rem] flex flex-col overflow-hidden shadow-soft">
                    <div class="h-56 relative bg-white overflow-hidden">
                        <div class="absolute top-6 left-6 bg-white border border-gray-100 p-2 rounded-xl shadow-sm">
                            <span class="text-city-black text-[10px] font-bold uppercase tracking-widest" style="">Arts
                                &amp; Culture</span>
                        </div>
                    </div>
                    <div class="p-6 bg-white flex justify-between items-center">
                        <div class="flex-1">
                            <h3 class="text-city-black font-bold text-lg leading-tight" style="">Modern Forms</h3>
                            <p class="text-gray-500 text-xs mt-1 mb-4" style="">Oct 28 • 11:30 AM</p>
                            <button
                                class="bg-city-purple text-white text-xs font-bold px-4 py-2 rounded-xl hover:opacity-90 transition-opacity uppercase tracking-wider"
                                style="">Register Now</button>
                        </div>
                        <div
                            class="bg-city-gray rounded-2xl p-4 flex items-center justify-center min-w-[56px] min-h-[56px] border border-gray-100 ml-4">
                            <svg class="h-6 w-6 text-city-purple" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                                <path
                                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
                                    stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <!-- Bottom Navigation Bar -->
        <nav
            class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white rounded-3xl px-8 py-3 flex justify-between items-center z-50 shadow-soft">
            <a class="flex items-center justify-center p-2 text-gray-500 hover:text-city-black transition-colors"
                href="../home_page/home.html" style="">
                <span class="material-symbols-outlined text-2xl" style="">home</span>
            </a>
            <a class="flex items-center justify-center" href="events.html" style="">
                <div class="bg-city-neon p-3 rounded-2xl text-black flex items-center justify-center shadow-subtle">
                    <span class="material-symbols-outlined text-2xl filled-icon" style="">calendar_today</span>
                </div>
            </a>
            <a class="flex items-center justify-center p-2 text-gray-500 hover:text-city-black transition-colors"
                href="#" style="">
                <span class="material-symbols-outlined text-2xl" style="">favorite</span>
            </a>
            <a class="flex items-center justify-center p-2 text-gray-500 hover:text-city-black transition-colors"
                href="#" style="">
                <span class="material-symbols-outlined text-2xl" style="">person</span>
            </a>
        </nav>
    </div>
</body>

</html>
